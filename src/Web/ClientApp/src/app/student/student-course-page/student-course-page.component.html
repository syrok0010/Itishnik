@let course = currentCourse$ | async;

<div
  class="flex w-full flex-col gap-4 rounded-lg bg-white p-4"
  style="view-transition-name: course-card-{{ course.id }}"
>
  <div class="flex justify-between">
    <h1
      class="text-2xl font-bold"
      style="view-transition-name: course-title-{{ course.id }}"
    >
      {{ course.name }}
    </h1>
    @if (!!course.grade) {
      <h2
        class="flex items-center text-xl font-semibold text-green-600"
        style="view-transition-name: course-grade-{{ course.id }}"
      >
        <tui-icon icon="@tui.award" class="mr-2 h-6 w-6"></tui-icon>
        <p>
          Оценка: <span class="text-2xl">{{ course.grade }}</span>
        </p>
      </h2>
    }
  </div>
  <tui-editor-socket [content]="course.description" />
</div>

<div class="mt-4 flex w-full flex-col gap-4 rounded-lg bg-white p-4">
  <tui-accordion>
    @for (block of course.taskBlocks; track block.id) {
      <button [tuiAccordion]="false">
        {{ block.name }}
      </button>
      <tui-expand>
        <app-student-task-blocks-accordion-item [taskBlock]="block" />
      </tui-expand>
    }
  </tui-accordion>
</div>
