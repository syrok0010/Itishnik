@let course = currentCourse$ | async;

<div
  class="flex w-full flex-col gap-4 rounded-lg bg-white p-4"
  style="view-transition-name: course-card-{{ course.id }}"
>
  <div class="flex justify-between">
    <h1
      class="text-2xl font-bold"
      style="view-transition-name: course-title-{{ course.id }}"
    >
      {{ course.name }}
    </h1>
    @if (!!course.grade) {
      <h2
        class="flex items-center text-xl font-semibold"
        style="view-transition-name: course-grade-{{ course.id }}"
      >
        <tui-icon
          icon="@tui.award"
          class="mr-1 h-6 w-6 text-green-600"
        ></tui-icon>
        <p>
          Оценка: <span class="text-2xl">{{ course.grade }}</span>
        </p>
      </h2>
    }
  </div>
  @if (!!course.description) {
    <tui-editor-socket [content]="course.description" />
  }
</div>

<div class="mt-4 flex w-full flex-col gap-4 rounded-lg bg-white p-4">
  <h1 class="text-2xl font-bold">Работы</h1>
  <tui-accordion>
    @for (block of sortedTaskBlocks$ | async; track block.id) {
      <button
        [tuiAccordion]="!!block.studentStartTime && inFuture(block.endTime)"
      >
        {{ block.name }}
      </button>
      <tui-expand>
        <app-student-task-blocks-accordion-item
          [taskBlock]="block"
          [courseId]="course.id"
        />
      </tui-expand>
    } @empty {
      <h3 class="text-center text-lg italic text-gray-600">Работ пока нет</h3>
    }
  </tui-accordion>
</div>
