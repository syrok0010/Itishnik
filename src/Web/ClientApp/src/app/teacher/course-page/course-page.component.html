<div class="flex flex-col w-full rounded-lg bg-white p-4 gap-4">
  <h1 class="text-2xl font-semibold">{{ currentCourse()?.name }}</h1>
  <label tuiLabel class="grow w-full">
    Описание курса
    <tui-textfield>
        <textarea
          [formControl]="descriptionControl"
          placeholder="Введите описание курса"
          tuiTextarea
          [min]="3"
        ></textarea>
    </tui-textfield>
  </label>
  <button
    appearance="primary"
    tuiButton
    type="button"
    class="shadow-sm mr-auto"
    [iconEnd]="'@tui.save'"
    size="m"
    (click)="saveDescription()"
  >
    Сохранить
  </button>
</div>

<div class="flex flex-col w-full rounded-lg grow bg-white p-4 pt-0 mt-4">
  <tui-tabs-with-more>
    <a
      *tuiItem
      routerLinkActive
      tuiTab
      [routerLink]="'taskBlocks'"
    >
      Работы
    </a>

    <a
      *tuiItem
      routerLinkActive
      tuiTab
      [routerLink]="'students'"
    >
      Студенты
    </a>
  </tui-tabs-with-more>

  <router-outlet class="mt-4" />

</div>
