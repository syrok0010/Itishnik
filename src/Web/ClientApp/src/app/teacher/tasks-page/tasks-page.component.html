@let data = taskFacade.taskList$ | async;

<div
  class="mx-auto flex h-full w-full grow flex-col items-center gap-2 rounded-lg bg-white p-4"
>
  <table tuiTable [columns]="columns" class="w-full">
    <thead>
    <tr tuiThGroup>
      <th tuiTh *tuiHead="'isPublic'">Публичная</th>
      <th tuiTh *tuiHead="'title'">Название</th>
      <th tuiTh *tuiHead="'author'">Автор</th>
      <th tuiTh *tuiHead="'tags'">Темы</th>
    </tr>
    </thead>
    <tbody tuiTbody [data]="data">
      @for (item of data; track item.id) {
        <tr tuiTr class="cursor-pointer hover:*:bg-gray-100 *:bg-transparent" [routerLink]="[item.id]">
          <td tuiTd *tuiCell="'isPublic'">
            <div tuiCell="l">
              <input
                tuiCheckbox
                type="checkbox"
                size="m"
                disabled
                [ngModel]="item.isPublic"
              />
            </div>
          </td>
          <td tuiTd *tuiCell="'title'">
            <div [tuiCell]="'l'">
              <span tuiTitle>{{ item.name }}</span>
            </div>
          </td>
          <td tuiTd *tuiCell="'author'">
            <div [tuiCell]="'l'">
              <tui-avatar
                [src]="item.teacherFullName | tuiInitials"
                [style.background]="item.teacherFullName | tuiAutoColor"
              />
              <span tuiTitle>
                {{ item.teacherFullName }}
                <span tuiSubtitle>{{ item.teacherEmail }}</span>
              </span>
            </div>
          </td>
          <td tuiTd *tuiCell="'tags'">
            <div [tuiCell]="'l'">
              @for (tag of item.tags; track tag.id) {
                <tui-chip
                  size="m"
                  appearance="custom"
                  [style.background-color]=" tag.text | tuiAutoColor">
                  {{ tag.text }}
                </tui-chip>
              }
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
