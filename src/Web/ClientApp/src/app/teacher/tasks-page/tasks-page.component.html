@let data = taskFacade.taskList$ | async;

<div
  class="mx-auto flex h-full w-full grow flex-col items-center gap-2 rounded-lg bg-white p-4"
>
  <table tuiTable [columns]="columns" class="w-full table-fixed">
    <thead>
    <tr tuiThGroup>
      <th tuiTh class="w-1/12" *tuiHead="'isPublic'">Публичная</th>
      <th tuiTh class="w-4/12" *tuiHead="'title'">Название</th>
      <th tuiTh class="w-3/12" *tuiHead="'author'">Автор</th>
      <th tuiTh class="w-4/12" *tuiHead="'tags'">Темы</th>
    </tr>
    </thead>
    <tbody tuiTbody [data]="data">
      @for (item of data; track item.id) {
        <tr tuiTr class="group cursor-pointer" [routerLink]="[item.id]">
          <td tuiTd *tuiCell="'isPublic'" class="group-hover:bg-gray-100 transition-colors duration-300 ease-in-out">
            <div tuiCell="l" class="flex justify-center">
              <input
                tuiCheckbox
                type="checkbox"
                size="m"
                disabled
                [ngModel]="item.isPublic"
              />
            </div>
          </td>
          <td tuiTd *tuiCell="'title'" class="group-hover:bg-gray-100 transition-colors duration-300 ease-in-out">
            <div [tuiCell]="'l'" class="overflow-hidden">
              <span tuiTitle class="truncate">{{ item.name }}</span>
            </div>
          </td>
          <td tuiTd *tuiCell="'author'" class="group-hover:bg-gray-100 transition-colors duration-300 ease-in-out">
            <div [tuiCell]="'l'" class="overflow-hidden">
              <tui-avatar
                [src]="item.teacherFullName | tuiInitials"
                [style.background]="item.teacherFullName | tuiAutoColor"
              />
              <span tuiTitle class="truncate">
                {{ item.teacherFullName }}
                <span tuiSubtitle class="truncate">{{ item.teacherEmail }}</span>
              </span>
            </div>
          </td>
          <td tuiTd *tuiCell="'tags'" class="group-hover:bg-gray-100 transition-colors duration-300 ease-in-out">
            <div [tuiCell]="'l'" class="flex flex-wrap gap-1">
              @for (tag of item.tags; track tag.id) {
                <tui-chip
                  size="m"
                  appearance="custom"
                  [style.background-color]="tag.text | tuiAutoColor">
                  {{ tag.text }}
                </tui-chip>
              }
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
