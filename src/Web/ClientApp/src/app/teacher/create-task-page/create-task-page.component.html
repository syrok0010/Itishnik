<form
  [formGroup]="form"
  class="flex w-full flex-col gap-4 rounded-lg bg-white p-4"
  style="view-transition-name: create-task-block"
  (ngSubmit)="createTask()"
>
  <div class="flex justify-between">
    <h1 class="text-2xl font-bold">Создать новое задание</h1>

    <button
      type="button"
      class="gemini-generate-button"
      (click)="showGenerateDialog()"
    >
      <span class="icon">✨</span>
      <span class="text">Сгенерировать</span>
    </button>
  </div>

  <div class="flex flex-col gap-4">
    <tui-input formControlName="name" [tuiTextfieldLabelOutside]="true">
      Название
      <input tuiTextfieldLegacy placeholder="Найдите минимум массива" />
    </tui-input>
    <div>
      <p class="mb-2 text-xl font-semibold">Текст задания</p>
      <tui-editor #textEditor formControlName="text" />
      <tui-error
        class="mt-2"
        formControlName="text"
        [error]="[] | tuiFieldError | async"
      />
    </div>
    <div>
      <p class="mb-2 text-xl font-semibold">Решение задания</p>
      <tui-editor #solutionEditor formControlName="solutionText"></tui-editor>
      <tui-error
        class="mt-2"
        formControlName="solutionText"
        [error]="[] | tuiFieldError | async"
      />
    </div>
    <label class="flex items-center gap-4 text-base">
      <input
        tuiCheckbox
        type="checkbox"
        formControlName="isPublic"
        [size]="'m'"
      />
      Сделать публичной
    </label>
  </div>

  <button
    tuiButton
    size="m"
    type="submit"
    class="mr-auto mt-4"
    [disabled]="form.invalid"
  >
    Сохранить
  </button>
</form>
