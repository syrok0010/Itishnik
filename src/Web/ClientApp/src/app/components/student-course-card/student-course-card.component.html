<div *ngIf="course" class="bg-white rounded-xl shadow-lg overflow-hidden transform transition-all duration-300 hover:scale-105 m-4 w-full md:max-w-sm">
  <img [src]="getPlaceholderImageUrl()" alt="Изображение курса" class="w-full h-48 object-cover">

  <div class="p-6">
    <h2 class="text-2xl font-bold text-gray-800 mb-2 truncate" [title]="course.name">{{ course.name || 'Название курса отсутствует' }}</h2>

    <div *ngIf="course.grade !== null && course.grade !== undefined" class="flex items-center text-green-600">
      <tui-icon icon="@tui.award" class="w-6 h-6 mr-2"></tui-icon> <p class="text-lg font-semibold">Оценка: {{ course.grade }}</p>
    </div>

    <div *ngIf="course.grade === null || course.grade === undefined" class="text-gray-600">
      <div *ngIf="course.nearestTaskBlockStart && course.nearestTaskBlockEnd">
        <p class="flex items-center mb-1">
          <tui-icon icon="@tui.calendar" class="w-5 h-5 mr-2 text-blue-500"></tui-icon> Начало: {{ course.nearestTaskBlockStart | date:'medium' }}
        </p>
        <p class="flex items-center">
          <tui-icon icon="@tui.calendar-x" class="w-5 h-5 mr-2 text-red-500"></tui-icon> Дедлайн: {{ course.nearestTaskBlockEnd | date:'medium' }}
        </p>
      </div>
      <p *ngIf="!course.nearestTaskBlockStart || !course.nearestTaskBlockEnd" class="text-sm text-gray-500 italic">
        Информация о ближайшей работе отсутствует.
      </p>
    </div>
  </div>
</div>
